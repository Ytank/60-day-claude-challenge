<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Integrity Analyzer</title>
<style>
  :root{
    --bg-0:#0a0a0d;
    --bg-1:#101014;
    --bg-2:#16161c;
    --card:#1a1a22;
    --card-hi:#20202a;
    --border:#2a2a35;
    --border-active:#3c3c4c;
    --text-hi:#f2f2f6;
    --text-mid:#a3a3b3;
    --text-low:#5f5f70;
    --good:#22c55e;
    --warn:#f5a623;
    --bad:#ef4444;
    --radius:20px;
    --radius-sm:14px;
    --serif:'Georgia','Iowan Old Style','Palatino Linotype',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    --mono:'Consolas','SF Mono','Courier New',monospace;
  }
  [data-theme="claude"]{ --accent:#d97757; --accent-2:#eb9f7c; --glow:rgba(217,119,87,0.28); }
  [data-theme="ocean"]{ --accent:#3b82f6; --accent-2:#22d3ee; --glow:rgba(59,130,246,0.28); }
  [data-theme="emerald"]{ --accent:#10b981; --accent-2:#4ade80; --glow:rgba(16,185,129,0.28); }
  [data-theme="violet"]{ --accent:#8b5cf6; --accent-2:#d8b4fe; --glow:rgba(139,92,246,0.28); }
  [data-theme="crimson"]{ --accent:#ef4444; --accent-2:#fb923c; --glow:rgba(239,68,68,0.28); }
  [data-theme="mono"]{ --accent:#c7c7d1; --accent-2:#e9e9ef; --glow:rgba(199,199,209,0.22); }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, var(--glow) 0%, transparent 60%),
      linear-gradient(180deg,var(--bg-0),var(--bg-1) 45%,var(--bg-0));
    color:var(--text-hi);
    font-family:var(--sans);
    min-height:100vh;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  #app{min-height:100vh;display:flex;flex-direction:column;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:var(--bg-0);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

  .grad-text{
    background:linear-gradient(120deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes pop{from{transform:scale(0.6);opacity:0;}to{transform:scale(1);opacity:1;}}
  .anim-up{animation:fadeUp .55s cubic-bezier(.16,1,.3,1) both;}
  .anim-in{animation:fadeIn .5s ease both;}

  /* ---------------- Header ---------------- */
  .topbar{
    position:sticky;top:0;z-index:60;
    background:rgba(10,10,13,0.86);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
    padding:14px 28px;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;}
  .brand-mark{
    width:36px;height:36px;border-radius:11px;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;font-size:17px;
    box-shadow:0 0 22px var(--glow);color:#151515;
  }
  .step-track{display:flex;align-items:center;gap:10px;}
  .step-pill{
    display:flex;align-items:center;gap:7px;padding:5px 12px 5px 6px;border-radius:99px;
    background:var(--card);border:1px solid var(--border);font-size:11.5px;color:var(--text-low);
    transition:all .3s ease;
  }
  .step-pill.active{border-color:var(--border-active);color:var(--text-hi);background:var(--card-hi);}
  .step-pill.done{color:var(--accent-2);}
  .step-num{
    width:18px;height:18px;border-radius:50%;background:var(--border);color:var(--text-low);
    font-size:10px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);
    transition:all .3s ease;
  }
  .step-pill.active .step-num{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#151515;}
  .step-pill.done .step-num{background:var(--accent);color:#151515;}
  .theme-link{
    font-size:12px;color:var(--text-low);background:none;border:1px solid var(--border);
    padding:6px 12px;border-radius:99px;cursor:pointer;transition:all .2s ease;font-family:var(--sans);
  }
  .theme-link:hover{border-color:var(--border-active);color:var(--text-hi);}

  .container{max-width:1080px;margin:0 auto;padding:36px 24px 90px;width:100%;flex:1;}

  /* ---------------- Buttons ---------------- */
  .btn{
    font-family:var(--sans);border:none;cursor:pointer;border-radius:13px;
    padding:14px 26px;font-size:14.5px;font-weight:650;
    transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease, background .2s ease;
    display:inline-flex;align-items:center;gap:9px;
  }
  .btn-primary{background:linear-gradient(120deg,var(--accent),var(--accent-2));color:#161616;}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px var(--glow);}
  .btn-primary:disabled{opacity:.32;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn-ghost{background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text-mid);}
  .btn-ghost:hover{border-color:var(--border-active);color:var(--text-hi);transform:translateY(-2px);}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-end;margin-top:26px;}

  /* ---------------- Cards ---------------- */
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:28px;transition:border-color .25s ease;
  }
  .card:hover{border-color:var(--border-active);}
  .section-tag{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent-2);font-weight:600;margin-bottom:10px;display:block;
  }

  /* ---------------- Theme select screen ---------------- */
  .theme-hero{text-align:center;max-width:640px;margin:20px auto 0;}
  .theme-hero h1{font-size:clamp(1.9rem,5vw,2.8rem);margin:0 0 12px;line-height:1.2;}
  .theme-hero p{color:var(--text-mid);font-size:15.5px;margin:0 auto 32px;max-width:520px;}
  .theme-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;max-width:760px;margin:0 auto;}
  .theme-card{
    cursor:pointer;border-radius:18px;padding:22px 16px;text-align:center;
    background:var(--bg-2);border:2px solid transparent;transition:all .25s ease;position:relative;
  }
  .theme-card:hover{transform:translateY(-4px);}
  .theme-swatch{
    width:52px;height:52px;border-radius:50%;margin:0 auto 14px;
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
  }
  .theme-card .tname{font-size:13.5px;font-weight:650;color:var(--text-hi);}
  .theme-card .tsub{font-size:11px;color:var(--text-low);margin-top:3px;}

  /* ---------------- Intro / concept cards ---------------- */
  .concept-card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:20px;}
  .concept-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:8px;}
  @media(max-width:760px){.concept-grid{grid-template-columns:1fr;}}
  .concept-card .tag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:inline-block;}
  .concept-card.what .tag{color:var(--accent-2);}
  .concept-card.why .tag{color:var(--warn);}
  .concept-card.life .tag{color:var(--accent);}
  .concept-card p{margin:0;font-size:13.6px;color:var(--text-mid);}

  /* ---------------- Metrics strip ---------------- */
  .metrics-strip{
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;
  }
  @media(max-width:760px){.metrics-strip{grid-template-columns:repeat(2,1fr);}}
  .metric-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;}
  .metric-box .mlabel{font-size:11.5px;color:var(--text-low);margin-bottom:8px;display:flex;justify-content:space-between;}
  .metric-box .mval{font-family:var(--mono);color:var(--text-hi);}
  .metric-bar-bg{height:7px;border-radius:99px;background:rgba(255,255,255,0.06);overflow:hidden;}
  .metric-bar-fill{height:100%;border-radius:99px;width:0%;transition:width .8s cubic-bezier(.4,0,.2,1),background .4s ease;}
  .metric-pending{color:var(--text-low);font-size:12px;font-style:italic;}

  /* ---------------- Article / headline display ---------------- */
  .outlet-tag{
    display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;
    color:var(--text-low);background:var(--bg-2);border:1px solid var(--border);padding:5px 12px;
    border-radius:99px;margin-bottom:18px;
  }
  .headline-display{
    font-family:var(--serif);font-size:clamp(1.4rem,3.2vw,2rem);line-height:1.35;
    margin:0 0 20px;font-weight:700;
  }
  .article-body{
    font-size:15px;color:var(--text-mid);line-height:1.75;background:var(--bg-2);
    border:1px solid var(--border);border-radius:var(--radius-sm);padding:22px;
  }
  .post-display{
    font-family:var(--serif);font-size:clamp(1.1rem,2.6vw,1.4rem);line-height:1.6;
    background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:24px;
    margin-bottom:4px;
  }

  /* ---------------- Choice buttons ---------------- */
  .choice-row{display:flex;gap:12px;flex-wrap:wrap;margin:18px 0 24px;}
  .choice-btn{
    flex:1;min-width:120px;padding:14px 18px;border-radius:13px;border:1.5px solid var(--border);
    background:var(--bg-2);color:var(--text-mid);cursor:pointer;font-weight:650;font-size:14px;
    transition:all .2s ease;text-align:center;
  }
  .choice-btn:hover{border-color:var(--border-active);color:var(--text-hi);transform:translateY(-2px);}
  .choice-btn.selected{
    border-color:var(--accent-2);color:var(--text-hi);
    background:linear-gradient(150deg,var(--glow),transparent);
    box-shadow:0 0 0 1px var(--accent-2);
  }

  .emotion-grid{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 24px;}
  .emotion-chip{
    padding:9px 16px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg-2);
    color:var(--text-mid);cursor:pointer;font-size:13.5px;font-weight:600;transition:all .2s ease;
  }
  .emotion-chip:hover{border-color:var(--border-active);color:var(--text-hi);}
  .emotion-chip.selected{
    border-color:var(--accent-2);color:#161616;background:linear-gradient(120deg,var(--accent),var(--accent-2));
  }

  /* ---------------- Word chip selection ---------------- */
  .word-select-box{
    background:var(--bg-2);border:1px dashed var(--border-active);border-radius:var(--radius-sm);
    padding:20px;font-size:15px;line-height:2.1;margin:16px 0 8px;
  }
  .word-chip{
    display:inline-block;padding:2px 5px;margin:1px;border-radius:6px;cursor:pointer;
    transition:all .15s ease;border:1px solid transparent;color:var(--text-hi);
  }
  .word-chip:hover{background:rgba(255,255,255,0.06);}
  .word-chip.selected{background:var(--accent);color:#161616;border-color:var(--accent);}
  .word-chip.correct{background:rgba(34,197,94,0.22);border-color:var(--good);color:#eafff0;}
  .word-chip.missed{background:rgba(239,68,68,0.18);border-color:var(--bad);color:#ffecec;text-decoration:underline;text-decoration-style:dotted;}
  .word-chip.extra{opacity:.55;}
  .hint-text{font-size:12px;color:var(--text-low);margin-bottom:6px;}

  /* ---------------- Reveal panels ---------------- */
  .reveal-hero{
    display:grid;grid-template-columns:180px 1fr;gap:24px;align-items:center;
    background:linear-gradient(150deg,var(--glow),transparent);
    border:1px solid var(--border-active);border-radius:var(--radius);padding:26px;margin-bottom:26px;
  }
  @media(max-width:640px){.reveal-hero{grid-template-columns:1fr;text-align:center;}}
  .score-ring{
    width:140px;height:140px;border-radius:50%;margin:0 auto;position:relative;
    background:conic-gradient(var(--accent-2) calc(var(--pct)*1%), rgba(255,255,255,0.07) 0);
    transition:background 1s ease;
  }
  .score-ring::before{content:"";position:absolute;inset:10px;border-radius:50%;background:var(--bg-1);}
  .score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .score-inner .num{font-size:30px;font-weight:800;}
  .score-inner .den{font-size:10.5px;color:var(--text-low);font-family:var(--mono);}
  .reveal-hero h2{margin:0 0 8px;font-size:21px;}
  .reveal-hero p{margin:0;color:var(--text-mid);font-size:14px;}

  .reveal-block{margin-bottom:22px;}
  .reveal-block .tag{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-2);margin-bottom:8px;display:block;}
  .reveal-block p{margin:0;font-size:14.5px;color:var(--text-mid);line-height:1.75;}
  .rewrite-box{
    background:var(--bg-2);border-left:3px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;
    padding:16px 20px;font-family:var(--serif);font-size:16px;color:var(--text-hi);
  }
  .takeaway-box{
    background:linear-gradient(150deg,var(--glow),transparent);border:1px solid var(--border-active);
    border-radius:var(--radius-sm);padding:18px 20px;
  }
  .takeaway-box .tag{color:var(--warn);}
  .feedback-box{
    background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:16px 18px;font-size:13.8px;color:var(--text-mid);margin-bottom:22px;
  }
  .match-stats{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;}
  .match-stat{font-family:var(--mono);font-size:12.5px;}
  .match-stat b{color:var(--text-hi);}

  /* ---------------- Dashboard ---------------- */
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
  @media(max-width:760px){.dash-grid{grid-template-columns:1fr;}}
  .dash-card h3{font-size:15.5px;margin:0 0 14px;display:flex;align-items:center;gap:8px;}
  .habit-list{display:grid;gap:12px;}
  .habit-item{
    display:flex;gap:14px;align-items:flex-start;background:var(--bg-2);
    border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;
  }
  .habit-num{
    width:26px;height:26px;border-radius:8px;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#161616;font-weight:700;
    display:flex;align-items:center;justify-content:center;font-size:12.5px;
  }
  .habit-item p{margin:0;font-size:13.6px;color:var(--text-mid);}
  .list-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.6px;color:var(--text-mid);}
  .list-item:last-child{border-bottom:none;}
  .red-flag-box{
    background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.35);border-radius:var(--radius-sm);
    padding:20px;margin-bottom:24px;
  }
  .red-flag-box .tag{color:var(--bad);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:8px;}
  .red-flag-box p{margin:0;font-size:14.5px;color:var(--text-hi);}
  .final-actions{display:flex;justify-content:center;gap:12px;margin-top:32px;flex-wrap:wrap;}
  .footer-note{text-align:center;color:var(--text-low);font-size:11.5px;margin-top:40px;font-family:var(--mono);}

  .hero{text-align:center;max-width:700px;margin:10px auto 0;}
  .hero h1{font-size:clamp(1.9rem,5vw,2.9rem);margin:0 0 14px;line-height:1.2;}
  .hero p{color:var(--text-mid);font-size:15.5px;max-width:600px;margin:0 auto 12px;}
</style>
</head>

<div id="app"></div>

<script>

var HEADLINE_SCENARIOS = [
  {
    id:1,

    article:"A small university lab study followed 24 adults over six weeks and found that participants who drank two cups of coffee daily showed slightly improved markers of cellular repair compared to a control group. Researchers were careful to note the sample size was small, the effect was modest, and long-term aging outcomes were not measured. The lead author said more research is needed before any claims can be made about coffee reversing aging.",

    misleadingWords:["BAN","Critics"],
    article:"The city council is reviewing a proposed ordinance that would require residents to obtain a $15 permit for garden plots larger than 200 square feet, primarily to track water usage during droughts. No part of the proposal bans gardening. A council spokesperson said the permit fee is meant to fund a rebate program for drought-resistant plants. Two residents who oppose the paperwork requirement were quoted calling it government overreach.",

  {
    id:3,

    outletType:"Tech blog — publishes quickly with light editorial review, occasional corrections after the fact.",
    outletReliability:58,

    misleadingWords:["Breakthrough","Obsolete"],
    article:"Engineers at a university lab have published early results on a battery material that charges roughly 20% faster in lab conditions and may reduce degradation over time. The technology is years away from commercial devices, requires expensive materials that aren't yet scalable, and researchers stressed that phones will still need to be charged — just potentially somewhat faster, with a slightly longer battery lifespan, once (and if) the technology reaches production.",

var EMOTION_SCENARIOS = [
  {
    id:1,
    platform:"Instagram Reel Caption",
    post:"They don't want you to know this one trick doctors are FURIOUS about. Big Pharma has spent MILLIONS burying this natural cure. Share before they take this video down!!",
    emotionalWords:["FURIOUS","Pharma","MILLIONS","burying","Share"],
    targetAudience:"People anxious about their health who distrust large institutions and are searching for simple, hidden answers to complex problems.",

  },
  {

    manipulationScore:82,

  },
  {

/* ============================================================
   HELPERS
============================================================ */
function pickScenario(pool, lastId){
  var choices = pool.filter(function(s){ return s.id !== lastId; });
  if(choices.length === 0){ choices = pool; }
  return choices[Math.floor(Math.random()*choices.length)];
}
function shuffleArr(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}
function escapeHtml(str){
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function tokenize(text){ return text.split(/\s+/); }
function stripToken(tok){ return tok.replace(/^[^A-Za-z0-9']+|[^A-Za-z0-9']+$/g,""); }
function computeAnswerIndices(tokens, keywords){
  var lowerKeywords = keywords.map(function(k){ return stripToken(k).toLowerCase(); });
  var result = {};
  tokens.forEach(function(tok,i){
    var clean = stripToken(tok).toLowerCase();
    if(lowerKeywords.indexOf(clean) !== -1){ result[i]=true; }
  });
  return result;
}
function countKeys(obj){ return Object.keys(obj).length; }
function scoreVersion(key,value){
  var negative = (key==="emotionalManipulation" || key==="audienceTargeting");
  return negative ? (100-value) : value;
}
function barColor(sv){
  if(sv>=65) return "var(--good)";
  if(sv>=40) return "var(--warn)";
  return "var(--bad)";
}
function goScreen(name){
  state.screen = name;
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

var STEP_LABELS = ["Welcome","Headline Detective","Emotion Detector","Dashboard"];
function stepIndexFor(screen){

  if(screen==="c2-intro" || screen==="c2-post" || screen==="c2-reveal") return 2;
  if(screen==="dashboard") return 3;
  return -1;
}
function headerHtml(){
  var idx = stepIndexFor(state.screen);
  var pills = "";
  if(idx >= 0){
    for(var i=0;i<STEP_LABELS.length;i++){
      var cls = "step-pill";
      if(i < idx) cls += " done";
      if(i === idx) cls += " active";
      pills += '<div class="'+cls+'"><span class="step-num">'+(i+1)+'</span>'+STEP_LABELS[i]+'</div>';
    }
  }
  return ''+
  '<div class="topbar">'+
    '<div class="brand"><div class="brand-mark">&#128269;</div>Media Integrity <span class="grad-text">Analyzer</span></div>'+
    (idx>=0 ? '<div class="step-track">'+pills+'</div>' : '<div></div>')+
    (state.screen!=="theme" ? '<button class="theme-link" onclick="changeTheme()">&#127912; Change theme</button>' : '<div></div>')+
  '</div>';
}
function metricsStripHtml(){
  var defs = [
    { key:"headlineAccuracy", label:"Headline Accuracy" },
    { key:"sourceReliability", label:"Source Reliability" },
    { key:"emotionalManipulation", label:"Emotional Manipulation" },
    { key:"audienceTargeting", label:"Audience Targeting" }
  ];
  var html = '<div class="metrics-strip">';
  defs.forEach(function(d){
    var val = state.metrics[d.key];
    if(val === null){
      html += '<div class="metric-box"><div class="mlabel">'+d.label+'</div><div class="metric-pending">Not yet assessed</div></div>';
    } else {
      var sv = scoreVersion(d.key, val);
      var color = barColor(sv);
      html += '<div class="metric-box">'+
        '<div class="mlabel"><span>'+d.label+'</span><span class="mval">'+Math.round(val)+'</span></div>'+
        '<div class="metric-bar-bg"><div class="metric-bar-fill" style="width:'+val+'%;background:'+color+';"></div></div>'+
      '</div>';
    }
  });
  html += '</div>';
  return html;
}

      no:"Good instinct &mdash; this headline turned out to be quite misleading, and your skepticism was well placed."
    },
    mid:{
      yes:"Understandable &mdash; the headline leans dramatic, though the article underneath is more measured than the wording suggests.",
      maybe:"Reasonable caution &mdash; this headline is moderately exaggerated compared to the actual findings.",
      no:"Solid instinct &mdash; this headline oversells a fairly modest, early-stage result."
    },

      no:"Interesting &mdash; this one is actually a fairly fair summary of the article, so a little extra skepticism wasn\'t strictly necessary here."

}

function biggestRedFlag(){
  var m = state.metrics;
  var entries = [
    { key:"headlineAccuracy", sv:scoreVersion("headlineAccuracy", m.headlineAccuracy) },
    { key:"sourceReliability", sv:scoreVersion("sourceReliability", m.sourceReliability) },
    { key:"emotionalManipulation", sv:scoreVersion("emotionalManipulation", m.emotionalManipulation) },
    { key:"audienceTargeting", sv:scoreVersion("audienceTargeting", m.audienceTargeting) }
  ];
  entries.sort(function(a,b){ return a.sv-b.sv; });
  var worst = entries[0].key;
  var s1 = state.scenario1, s2 = state.scenario2;
  if(worst === "headlineAccuracy"){
    return "The headline \""+s1.headline+"\" scored just "+s1.accuracyScore+"/100 on accuracy. "+s1.explanation;
  }
  if(worst === "sourceReliability"){
    return "The outlet behind that headline, "+s1.outlet+", rated only "+s1.outletReliability+"/100 for reliability. "+s1.outletType;
  }
  if(worst === "emotionalManipulation"){
    return "The "+s2.platform.toLowerCase()+" you reviewed scored "+s2.manipulationScore+"/100 for emotional manipulation. "+s2.manipulationTechnique;
  }
  return "That post was precisely targeted (audience targeting score: "+s2.audienceTargetingScore+"/100). "+s2.targetAudience;
}

function screenDashboard(){
  var m = state.metrics;
  var vals = [
    scoreVersion("headlineAccuracy", m.headlineAccuracy),
    scoreVersion("sourceReliability", m.sourceReliability),
    scoreVersion("emotionalManipulation", m.emotionalManipulation),
    scoreVersion("audienceTargeting", m.audienceTargeting)
  ];
  var overall = Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);

  var grade = overall>=75 ? {label:"Sharp-Eyed Reader",color:"var(--good)"} :
              overall>=55 ? {label:"Increasingly Aware",color:"var(--accent-2)"} :
              overall>=35 ? {label:"Building Instincts",color:"var(--warn)"} :
              {label:"Just Getting Started",color:"var(--bad)"};

  var habitsHtml = state.habits.map(function(h,i){
    return '<div class="habit-item"><div class="habit-num">'+(i+1)+'</div><p>'+h+'</p></div>';
  }).join('');

  var learnedItems = [
    state.scenario1.keyTakeaway,
    state.scenario2.keyTakeaway,
    "Your own emotional and click reactions are data too &mdash; noticing them is the first step to resisting manipulation."
  ];
  var learnedHtml = learnedItems.map(function(t){
    return '<div class="list-item"><span>&#10003;</span><span>'+t+'</span></div>';
  }).join('');

  return headerHtml()+
  '<div class="container">'+
    '<div class="reveal-hero anim-up">'+
      '<div class="score-ring" style="--pct:'+overall+';"><div class="score-inner"><div class="num">'+overall+'</div><div class="den">/ 100</div></div></div>'+
      '<div>'+
        '<span class="section-tag">Final Report</span>'+
        '<h2>Your Media Integrity Score</h2>'+
        '<p>Based on the headline and post you just analyzed, here\'s how your media literacy instincts performed across all four dimensions.</p>'+
        '<span style="display:inline-block;margin-top:10px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:5px 14px;border-radius:99px;color:'+grade.color+';border:1px solid '+grade.color+';">'+grade.label+'</span>'+
      '</div>'+
    '</div>'+

    '<div class="card" style="margin-bottom:24px;">'+
      '<span class="section-tag">Final Metrics</span>'+
      metricsStripHtml()+
    '</div>'+

    '<div class="red-flag-box"><span class="tag">&#9888; Biggest Red Flag From This Session</span><p>'+biggestRedFlag()+'</p></div>'+

    '<div class="dash-grid">'+
      '<div class="card dash-card"><h3>&#128218; What You Learned</h3>'+learnedHtml+'</div>'+
      '<div class="card dash-card"><h3>&#127919; Practical Habits To Build</h3><div class="habit-list">'+habitsHtml+'</div></div>'+
    '</div>'+

    '<div class="final-actions">'+
      '<button class="btn btn-primary" onclick="replay()">&#128260; Replay With New Scenarios</button>'+
      '<button class="btn btn-ghost" onclick="changeTheme()">&#127912; Change Theme</button>'+
    '</div>'+

    '<div class="footer-note">MEDIA INTEGRITY ANALYZER &middot; EDUCATIONAL SIMULATION &middot; ALL SCENARIOS ARE FICTIONAL AND GENERATED FOR PRACTICE</div>'+
  '</div>';
}

/* ============================================================
   RENDER DISPATCH
============================================================ */
function render(){
  var app = document.getElementById("app");
  var html;
  switch(state.screen){
    case "theme": html = screenTheme(); break;
    case "welcome": html = screenWelcome(); break;
    case "c1-intro": html = screenC1Intro(); break;
    case "c1-headline": html = screenC1Headline(); break;
    case "c1-reveal": html = screenC1Reveal(); break;
    case "c2-intro": html = screenC2Intro(); break;
    case "c2-post": html = screenC2Post(); break;
    case "c2-reveal": html = screenC2Reveal(); break;
    case "dashboard": html = screenDashboard(); break;
    default: html = screenTheme();
  }
  app.innerHTML = html;
}

render();
</script>
